on:
  workflow_dispatch:        
  push:
    tags:
      - 'v*'              

name: "Build & Release"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Step 2: Cache pub dependencies
      - name: Cache pub dependencies
        uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # Step 3: Setup Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: true

      # Step 4: Get dependencies
      - run: flutter pub get

      # Step 6: Run unit & widget tests
      - name: Run tests
        run: flutter test --coverage

      # Step 7: Upload coverage report (optional, viewable in Actions)
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

  # ✅ JOB 2: Build & Release (only runs if tests pass)
  build:
    name: Build & Release
    runs-on: ubuntu-latest    
    
    steps:
      # Step 1: Checkout code
      - uses: actions/checkout@v3

      # Step 2: Cache pub dependencies
      - name: Cache pub dependencies
        uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # Step 3: Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Step 4: Setup Flutter with SDK cache
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: true

      # Step 5: Get dependencies
      - run: flutter pub get

      # Step 6: Build APK
      - run: flutter build apk --release --split-per-abi

      # Step 7: Push to GitHub Releases
      - name: Push to Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/apk/release/*"
          tag: ${{ github.ref_name }}
          token: ${{ secrets.TOKEN }}
